name = "yeison"
description = "A JSON-like data structure using Ada 2022 features"
version = "0.3.1"
# 0.3.1: feature complete (only merge missing)

licenses = "MIT"
authors = ["Alejandro R. Mosteo"]
maintainers = ["Alejandro R. Mosteo <alejandro@mosteo.com>"]
maintainers-logins = ["mosteo"]
tags = ["json", "yaml", "toml", "containers"]
website = "https://github.com/mosteo/yeison"

[build-switches]
"*".ada_version = "Ada2022"

[[depends-on]]
# gnat = "<13.2 | >=13.3" # Known bug with finalization at lib level
yeison_12 = "*" # Only for the type-agnostic Yeison_Utils

[[pins]]
yeison_12 = { path='../yeison_12' }

[test]
runner = "alire"
