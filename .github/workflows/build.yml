name: Build

on:
  workflow_call:
    inputs:
      crate:
        description: 'The crate to build'
        required: true
        type: string

jobs:
  crate:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
        gnat_version: [12, 13, 14, 15]
        # Pre -12 don't support Ada 2022
        # 13.2 is buggy w.r.t. to finalization
        # When 16 is added here: re-test combined named+unnamed container
        # aggregates (single type with both Add_Unnamed and Add_Named). Rejected
        # by 14.2/15.2 ("conflicting operations for aggregate, RM 4.3.5"); if 16
        # supports it, drop yeison_22's "+[...]" operator. See
        # yeison_22/src/yeison-operators.ads.
        exclude:
          # Some combos are not supported due to missing pieces in the toolchain
          # No builds of gcc-10, -11, -12 that work on arm64
          - os: macos-latest
            gnat_version: 12

    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v2

    - name: Set up Alire and toolchain
      uses: alire-project/setup-alire@v5
      with:
        version: nightly # So it supports alr test
        toolchain: gnat_native^${{ matrix.gnat_version }} gprbuild

    - name: Show GNAT version
      run: cd ${{inputs.crate}} && alr exec -- gnat --version

    - name: Build
      run: cd ${{inputs.crate}} && alr build --validation

    - name: Run tests
      run: cd ${{inputs.crate}} && alr test
